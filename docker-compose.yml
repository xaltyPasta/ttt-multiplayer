version: "3"

services:
  postgres:
    image: postgres:12.2-alpine
    environment:
      - POSTGRES_DB=nakama
      - POSTGRES_PASSWORD=localdb
    volumes:
      - data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
      interval: 3s
      timeout: 3s
      retries: 5

  nakama:
    image: heroiclabs/nakama:3.21.1
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
        --name nakama1
        --database.address postgres:localdb@postgres:5432/nakama
        --logger.level DEBUG
        --session.token_expiry_sec 7200
        --metrics.prometheus_port 9100
        --console.port 7351
        --socket.server_key=defaultkey
        --runtime.http_key=defaultkey
        --session.encryption_key=supersecretkey
        --session.refresh_encryption_key=supersecretkey2
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./nakama/build:/nakama/data/modules
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  data:
